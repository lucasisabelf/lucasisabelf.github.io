<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header class="app-header">
      <h1>Sprint Board</h1>
      <p class="hint">
        Cole o link da planilha (as abas devem se chamar <strong>To Do</strong>, <strong>In Progress</strong> e <strong>Done</strong>).
        Os dados devem começar na linha 3.
      </p>
      <div class="input-row">
        <select id="sheet-select">
          <option value="">Selecionar planilha...</option>
        </select>
        <input id="sheet-url" type="url" placeholder="https://docs.google.com/spreadsheets/d/..." autocomplete="off" />
        <button id="load-btn">Carregar</button>
      </div>
      <a id="edit-link" class="edit-link hidden" target="_blank" rel="noopener noreferrer">
        Ir para planilha / Editar
      </a>
    </header>

    <div id="state-idle" class="state-panel">Insira o link da planilha acima para começar.</div>
    <div id="state-loading" class="state-panel hidden">
      <div class="spinner"></div>
      <span>Carregando...</span>
    </div>
    <div id="state-error" class="state-panel state-error hidden" role="alert"></div>

    <div id="board" class="board hidden">
      <div id="col-todo" class="column">
        <div class="column-header todo-header">To Do</div>
        <div class="column-body" id="body-todo"></div>
      </div>
      <div id="col-progress" class="column">
        <div class="column-header progress-header">In Progress</div>
        <div class="column-body" id="body-progress"></div>
      </div>
      <div id="col-done" class="column">
        <div class="column-header done-header">Done</div>
        <div class="column-body" id="body-done"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
